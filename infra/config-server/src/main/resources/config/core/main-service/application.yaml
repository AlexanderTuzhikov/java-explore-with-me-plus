server:
  port: 0

stats-server:
  service-id: STAT-SVC-SERVICE

logging:
  level:
    root: INFO
    ru.practicum: DEBUG
    org.springframework.web: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

spring:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  sql:
    init:
      mode: always
  datasource:
    url: jdbc:postgresql://localhost:5433/ewm
    username: ewm
    password: 12345
    driver-class-name: org.postgresql.Driver
